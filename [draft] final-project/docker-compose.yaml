# OJK/BI Regulatory Intelligence Assistant
# Docker Compose - All Services
# Usage: docker-compose up -d

version: '3.8'

services:

  # ─────────────────────────────────────────────
  # PostgreSQL + pgvector (vector store + logging)
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ojk_rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ojk_rag}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./monitoring/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ojk_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Open WebUI (Chat Interface)
  # ─────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ojk_rag_webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ojk_rag}
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # N8N (Ingestion Pipeline)
  # ─────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: ojk_rag_n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-ojk_rag}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-raguser}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./ingestion/n8n-workflows:/home/node/.n8n/workflows
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Grafana (Monitoring Dashboard)
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ojk_rag_grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - postgres

volumes:
  postgres_data:
  open_webui_data:
  n8n_data:
  grafana_data:

networks:
  default:
    name: ojk_rag_network
